<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZRDWAGES | The Arena</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prosto+One&family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #3b82f6; --green: #10b981; --red: #ef4444; --gold: #fbbf24; --border: #1e293b; --bg: #020617; --card-bg: #0f172a; --text-main: #f8fafc; --text-sub: #94a3b8; }
        * { box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text-main); overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Prosto One', cursive; text-transform: uppercase; color: #fff; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .heartbeat { width: 200px; animation: beat 1.2s infinite; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Nav */
        nav { border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); z-index: 100; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }

        /* Stats & Leaderboard */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-box { padding: 15px; border-radius: 15px; background: rgba(59, 130, 246, 0.05); border: 1px dashed var(--border); text-align: center; }
        .leader-item { display: flex; justify-content: space-between; font-size: 12px; margin: 5px 0; font-weight: bold; }

        /* Grid & Cards */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .card-img { width: 100%; height: 180px; object-fit: cover; opacity: 0.9; }
        .card-content { padding: 20px; }

        /* Buttons */
        .opt-btn { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--border); border-radius: 12px; background: #1e293b; color: #fff; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { background: var(--blue); border-color: #fff; }
        .btn-p { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-family: 'Prosto One'; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal { background: var(--card-bg); padding: 30px; border-radius: 24px; width: 100%; max-width: 450px; border: 1px solid var(--blue); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--border); border-radius: 12px; background: #020617; color: #fff; }
        
        .hidden { display: none !important; }
        .winner-glow { border: 2px solid var(--gold) !important; box-shadow: 0 0 20px rgba(251,191,36,0.15); }
    </style>
</head>
<body>

    <div id="loader">
        <img src="logo.png" class="heartbeat">
        <p style="font-family:'Prosto One'; color: var(--text-sub); margin-top: 20px;">SUMMONING ARENA...</p>
    </div>

    <nav id="navbar" class="hidden">
        <img src="logo.png" height="35">
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="user-display" style="font-weight: 800; color: var(--blue); font-size: 13px;"></span>
            <button class="btn-p" onclick="openModal()" style="font-size: 11px;">+ NEW WAGER</button>
        </div>
    </nav>

    <div id="auth-screen" class="container hidden" style="text-align: center; padding-top: 10vh;">
        <img src="logo.png" width="300" style="margin-bottom: 2rem;">
        <h2>Wizard Identity</h2>
        <input type="text" id="username-input" placeholder="Wizard Name..." style="max-width: 300px;"><br>
        <button class="btn-p" onclick="handleLogin()">Enter WZRDWAGES</button>
    </div>

    <main id="main-content" class="container hidden">
        <div class="stats-grid">
            <div class="stat-box">
                <div style="font-size: 10px; color: var(--text-sub);">TOTAL ACTION</div>
                <div id="total-votes" style="font-family: 'Prosto One'; font-size: 18px; color: var(--blue);">0</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 10px; color: var(--text-sub);">ARENA LEADERS</div>
                <div id="leaderboard-mini" style="margin-top: 5px;"></div>
            </div>
        </div>
        <div id="market-list" class="market-grid"></div>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h3 style="margin-top: 0;">Create Market</h3>
            <input type="text" id="m-title" placeholder="The Question?">
            <input type="text" id="m-opts" placeholder="Options (Yes, No, Maybe)">
            <label style="font-size: 11px; color: var(--text-sub);">IMAGE UPLOAD</label>
            <input type="file" id="m-file" accept="image/*" style="border: 1px dashed var(--border);">
            <div style="display: flex; gap: 10px;">
                <button id="deploy-btn" class="btn-p" style="flex: 2;" onclick="deploy()">DEPLOY</button>
                <button class="btn-p" style="flex: 1; background: #475569;" onclick="closeModal()">X</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAQvmIKioJzKfHZNsoVnYbqR0-X49F2PEk",
            authDomain: "wzrdwages.firebaseapp.com",
            projectId: "wzrdwages",
            storageBucket: "wzrdwages.firebasestorage.app",
            messagingSenderId: "714039887526",
            appId: "1:714039887526:web:e3db8856fe1370192a5667",
            measurementId: "G-Q7GSN4RR2L"
        };
        const IMGBB_KEY = "d8064f8aa19b14e1da31fbd3221f492e";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let user = localStorage.getItem('wzrd_user');
        let votedMap = JSON.parse(localStorage.getItem('wzrd_voted_map')) || {}; // {marketId: "OptionName"}

        window.handleLogin = () => {
            const val = document.getElementById('username-input').value;
            if(val) { localStorage.setItem('wzrd_user', val.trim()); location.reload(); }
        };

        window.openModal = () => document.getElementById('modal-overlay').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');

        window.deploy = async () => {
            const title = document.getElementById('m-title').value;
            const rawOpts = document.getElementById('m-opts').value.split(',');
            const file = document.getElementById('m-file').files[0];
            const btn = document.getElementById('deploy-btn');
            
            if(!title || rawOpts.length < 1) return alert("Fill fields!");
            btn.innerText = "UPLOADING..."; btn.disabled = true;

            let imgUrl = 'https://via.placeholder.com/400x200/0f172a/ffffff?text=WZRDWAGES';
            if (file) {
                const fd = new FormData(); fd.append("image", file);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
                    const d = await res.json(); imgUrl = d.data.url;
                } catch (e) { console.error(e); }
            }

            const options = {};
            rawOpts.forEach(o => { if(o.trim()) options[o.trim()] = 0; });

            await push(ref(db, 'markets'), {
                title, creator: user, img: imgUrl, options, winner: null, createdAt: Date.now()
            });
            location.reload();
        };

        window.vote = (id, opt) => {
            if(votedMap[id]) return alert("Already wagered!");
            update(ref(db, `markets/${id}/options`), { [opt]: 1 }); // Just to increment
            const vRef = ref(db, `markets/${id}/options/${opt}`);
            onValue(vRef, (s) => {
                update(ref(db, `markets/${id}/options`), { [opt]: (s.val() || 0) + 1 });
                votedMap[id] = opt;
                localStorage.setItem('wzrd_voted_map', JSON.stringify(votedMap));
            }, { onlyOnce: true });
        };

        window.manageMarket = (id, title, opts) => {
            const cmd = prompt(`'WIN' or 'DELETE' for "${title}"`);
            if(cmd?.toUpperCase() === 'DELETE') { if(confirm("Destroy?")) remove(ref(db, `markets/${id}`)); }
            else if(cmd?.toUpperCase() === 'WIN') {
                const win = prompt(`Winner? (${Object.keys(opts).join(", ")})`);
                if(opts[win] !== undefined) update(ref(db, `markets/${id}`), { winner: win });
            }
        };

        if(!user) document.getElementById('auth-screen').classList.remove('hidden');
        else {
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = "@" + user;
        }

        onValue(ref(db, 'markets'), (snap) => {
            const data = snap.val();
            const list = document.getElementById('market-list');
            const leaders = {};
            let globalV = 0;
            list.innerHTML = '';

            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const m = data[id];
                    let mV = 0;
                    Object.values(m.options).forEach(v => { mV += v; globalV += v; });
                    
                    // Leaderboard calc: If winner set, check who guessed right
                    if(m.winner) {
                        // This is a rough simulation since we don't have a user database
                        // Realistically, the creator gets a 'Rep' point for closing a market
                        leaders[m.creator] = (leaders[m.creator] || 0) + 1;
                    }

                    const myVote = votedMap[id];
                    const isSet = m.winner != null;

                    let oHtml = '';
                    for (let o in m.options) {
                        const pct = mV > 0 ? Math.round((m.options[o] / mV) * 100) : 0;
                        const win = m.winner === o;
                        const chosen = myVote === o;
                        oHtml += `<button class="opt-btn" style="${(myVote || isSet) ? 'opacity:0.6;' : ''} ${win ? 'border:2px solid var(--gold); background:#451a03;' : ''} ${chosen && !win ? 'border:1px solid var(--blue);' : ''}" onclick="${(myVote || isSet) ? '' : `vote('${id}', '${o}')`}">
                            <span>${win ? '🏆 ' : ''}${o}</span><span>${(myVote || isSet) ? pct+'%' : ''}</span></button>`;
                    }

                    list.innerHTML += `<div class="card ${isSet ? 'winner-glow' : ''}">
                        <img src="${m.img}" class="card-img">
                        <div class="card-content">
                            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-sub);margin-bottom:10px;">
                                <span>BY ${m.creator.toUpperCase()}</span>
                                ${user === m.creator ? `<span onclick="manageMarket('${id}', '${m.title}', ${JSON.stringify(m.options)})" style="color:var(--blue);cursor:pointer">[ MANAGE ]</span>` : ''}
                            </div>
                            <h3 style="margin:0 0 10px 0; font-size: 1rem;">${m.title}</h3>
                            <div style="font-size:11px; color:${isSet ? 'var(--gold)' : 'var(--blue)'}; font-weight:800; margin-bottom:10px;">
                                ${isSet ? 'WAGER CLOSED' : mV + ' VOTES'} ${myVote ? '• YOU PICKED '+myVote : ''}
                            </div>
                            ${oHtml}
                        </div>
                    </div>`;
                });
            }

            document.getElementById('total-votes').innerText = globalV;
            const lBox = document.getElementById('leaderboard-mini');
            lBox.innerHTML = Object.entries(leaders).sort((a,b)=>b[1]-a[1]).slice(0,3)
                .map(l => `<div class="leader-item"><span>@${l[0]}</span><span>${l[1]} WINS</span></div>`).join('') || "No winners yet...";
            
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1000);
        });
    </script>
</body>
</html>
