<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WZRDWAGES | The Arena</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Prosto+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--blue:#3b82f6;
--gold:#fbbf24;

--border:#1e293b;
--bg:#020617;
--card-bg:#0f172a;

--text-main:#f8fafc;
--text-sub:#94a3b8;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Open Sans',sans-serif;
background:var(--bg);
margin:0;
color:var(--text-main);
overflow-x:hidden;
}

h1,h2,h3{
font-family:'Prosto One';
text-transform:uppercase;
}

.container{
max-width:1100px;
margin:20px auto;
padding:0 16px;
}

/* loader */

#loader{
position:fixed;
inset:0;
background:var(--bg);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.heartbeat{
width:200px;
animation:beat 1.2s infinite;
}

@keyframes beat{
0%,100%{transform:scale(1)}
50%{transform:scale(1.05)}
}

/* navbar */

nav{
border-bottom:1px solid var(--border);
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
background:rgba(2,6,23,.9);
backdrop-filter:blur(10px);
z-index:100;
}

nav img{
height:32px;
}

/* buttons */

.btn-p{
background:var(--blue);
border:none;
padding:12px 18px;
border-radius:12px;
font-family:'Prosto One';
font-size:12px;
cursor:pointer;
min-height:44px;
}

/* stats */

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:20px;
}

.stat-box{
padding:16px;
border-radius:14px;
background:rgba(59,130,246,.05);
border:1px dashed var(--border);
text-align:center;
}

.leader-item{
display:flex;
justify-content:space-between;
font-size:12px;
margin:4px 0;
font-weight:700;
}

/* markets */

.market-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

/* card */

.card{
background:var(--card-bg);
border:1px solid var(--border);
border-radius:18px;
overflow:hidden;
transition:transform .25s ease;
touch-action:pan-y;
}

.card.swiping{
transition:none;
}

.card-img{
width:100%;
height:180px;
object-fit:cover;
opacity:.9;
}

.card-content{
padding:18px;
}

/* options */

.opt-btn{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid var(--border);
background:#1e293b;
color:white;
font-weight:700;
cursor:pointer;
display:flex;
flex-direction:column;
gap:6px;
min-height:44px;
}

.vote-bar{
width:100%;
height:6px;
background:#020617;
border-radius:20px;
overflow:hidden;
}

.vote-fill{
height:100%;
background:var(--blue);
width:0%;
transition:width .6s ease;
}

.vote-fill.pulse{
animation:pulse .6s ease;
}

@keyframes pulse{
0%{transform:scaleY(1)}
50%{transform:scaleY(1.7)}
100%{transform:scaleY(1)}
}

/* modal bottom sheet */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:flex-end;
justify-content:center;
padding:0;
z-index:1000;
}

.modal{
background:var(--card-bg);
width:100%;
max-width:500px;
border-radius:20px 20px 0 0;
padding:24px;
border-top:2px solid var(--blue);
animation:sheetUp .3s ease;
}

@keyframes sheetUp{
from{transform:translateY(100%)}
to{transform:translateY(0)}
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid var(--border);
background:#020617;
color:white;
}

.hidden{
display:none!important;
}

.winner-glow{
border:2px solid var(--gold)!important;
box-shadow:0 0 20px rgba(251,191,36,.2);
}

/* mobile */

@media(max-width:768px){

.market-grid{
grid-template-columns:1fr;
}

.card-img{
height:140px;
}

.stats-grid{
grid-template-columns:1fr;
}

#user-display{
display:none;
}

}

</style>

</head>

<body>

<div id="loader">
<img src="logo.png" class="heartbeat">
<p style="font-family:'Prosto One';color:var(--text-sub);margin-top:20px;">SUMMONING ARENA...</p>
</div>

<nav id="navbar" class="hidden">

<img src="logo.png">

<div style="display:flex;align-items:center;gap:12px;">
<span id="user-display" style="font-weight:800;color:var(--blue);font-size:13px;"></span>
<button class="btn-p" onclick="openModal()">+ NEW WAGER</button>
</div>

</nav>

<div id="auth-screen" class="container hidden" style="text-align:center;padding-top:10vh;">

<img src="logo.png" width="260" style="margin-bottom:2rem;">

<h2>Wizard Identity</h2>

<input type="text" id="username-input" placeholder="Wizard Name..." style="max-width:280px">

<br>

<button class="btn-p" onclick="handleLogin()">Enter WZRDWAGES</button>

</div>

<main id="main-content" class="container hidden">

<div class="stats-grid">

<div class="stat-box">
<div style="font-size:11px;color:var(--text-sub)">TOTAL ACTION</div>
<div id="total-votes" style="font-family:'Prosto One';font-size:20px;color:var(--blue)">0</div>
</div>

<div class="stat-box">
<div style="font-size:11px;color:var(--text-sub)">ARENA LEADERS</div>
<div id="leaderboard-mini" style="margin-top:6px"></div>
</div>

</div>

<div id="market-list" class="market-grid"></div>

</main>

<div id="modal-overlay" class="modal-overlay hidden">

<div class="modal">

<h3>Create Market</h3>

<input id="m-title" placeholder="The Question?">
<input id="m-opts" placeholder="Options (Yes, No, Maybe)">

<div style="display:flex;gap:10px">

<button id="deploy-btn" class="btn-p" style="flex:2" onclick="deploy()">DEPLOY</button>

<button class="btn-p" style="flex:1;background:#475569" onclick="closeModal()">X</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAQvmIKioJzKfHZNsoVnYbqR0-X49F2PEk",
authDomain:"wzrdwages.firebaseapp.com",
projectId:"wzrdwages",
storageBucket:"wzrdwages.firebasestorage.app",
messagingSenderId:"714039887526",
appId:"1:714039887526:web:e3db8856fe1370192a5667"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let user=localStorage.getItem('wzrd_user');
let votedMap=JSON.parse(localStorage.getItem('wzrd_voted_map'))||{};

window.handleLogin=()=>{
const val=document.getElementById('username-input').value;
if(val){
localStorage.setItem('wzrd_user',val.trim());
location.reload();
}
};

window.openModal=()=>{
document.getElementById('modal-overlay').classList.remove('hidden');
document.body.style.overflow='hidden';
}

window.closeModal=()=>{
document.getElementById('modal-overlay').classList.add('hidden');
document.body.style.overflow='';
}

window.deploy=async()=>{

const title=document.getElementById('m-title').value;
const rawOpts=document.getElementById('m-opts').value.split(',');

if(!title||rawOpts.length<1)return alert("Fill fields!");

const options={};

rawOpts.forEach(o=>{
if(o.trim())options[o.trim()]=0;
});

await push(ref(db,'markets'),{
title,
creator:user,
img:'https://i.ibb.co/S4QyzrTK/wzrdwagesplchlder.jpg',
options,
winner:null,
createdAt:Date.now()
});

closeModal();

document.getElementById('m-title').value='';
document.getElementById('m-opts').value='';
};

window.vote=(id,opt)=>{

if(votedMap[id])return alert("Already wagered!");

const voteRef=ref(db,`markets/${id}/options/${opt}`);

onValue(voteRef,(snap)=>{

const count=snap.val()||0;

update(ref(db,`markets/${id}/options`),{[opt]:count+1})
.then(()=>{
votedMap[id]=opt;
localStorage.setItem('wzrd_voted_map',JSON.stringify(votedMap));
});

},{onlyOnce:true});

};

window.manageMarket=(id,title)=>{

const cmd=prompt(`WIN or DELETE for "${title}"`);

if(cmd?.toUpperCase()==='DELETE'){
if(confirm("Destroy?"))remove(ref(db,`markets/${id}`));
}

else if(cmd?.toUpperCase()==='WIN'){

const marketRef=ref(db,`markets/${id}/options`);

onValue(marketRef,(snap)=>{

const options=snap.val();

if(options){

const win=prompt(`Winner? (${Object.keys(options).join(", ")})`);

if(win&&options[win]!==undefined){
update(ref(db,`markets/${id}`),{winner:win});
}

}

},{onlyOnce:true});

}

};

if(!user){
document.getElementById('auth-screen').classList.remove('hidden');
}
else{
document.getElementById('navbar').classList.remove('hidden');
document.getElementById('main-content').classList.remove('hidden');
document.getElementById('user-display').innerText="@"+user;
}

onValue(ref(db,'markets'),(snap)=>{

const data=snap.val();
const list=document.getElementById('market-list');
const leaders={};
let globalV=0;

list.innerHTML='';

if(data){

Object.keys(data).reverse().forEach(id=>{

const m=data[id];

let mV=0;

Object.values(m.options||{}).forEach(v=>{
mV+=v;
globalV+=v;
});

if(m.winner&&m.creator){
leaders[m.creator]=(leaders[m.creator]||0)+1;
}

const myVote=votedMap[id];
const isSet=m.winner!=null;

let oHtml='';

for(let o in m.options){

const voteCount=m.options[o];
const pct=mV>0?Math.round(voteCount/mV*100):0;

const win=m.winner===o;
const chosen=myVote===o;

const voteFunc=(myVote||isSet)?'':`vote('${id}','${o}')`;

oHtml+=`

<button class="opt-btn"
style="${(myVote||isSet)?'opacity:.7;':''}
${win?'border:2px solid var(--gold);background:#451a03;':''}"
onclick="${voteFunc}">

<div style="display:flex;justify-content:space-between;width:100%">
<span>${win?'🏆 ':''}${o}</span>
<span>${(myVote||isSet)?pct+'%':''}</span>
</div>

<div class="vote-bar">
<div class="vote-fill ${chosen?'pulse':''}" style="width:${pct}%"></div>
</div>

</button>

`;

}

list.innerHTML+=`

<div class="card ${isSet?'winner-glow':''}">

<img src="${m.img}" class="card-img">

<div class="card-content">

<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-sub);margin-bottom:10px">
<span>BY ${(m.creator||'ANON').toUpperCase()}</span>
${user===m.creator?`<span onclick="manageMarket('${id}','${m.title}')" style="color:var(--blue);cursor:pointer">MANAGE</span>`:''}
</div>

<h3 style="font-size:1rem;margin-bottom:10px">${m.title}</h3>

<div style="font-size:11px;color:${isSet?'var(--gold)':'var(--blue)'};font-weight:700;margin-bottom:10px">
${isSet?'WAGER CLOSED':mV+' VOTES'} ${myVote?'• YOU PICKED '+myVote:''}
</div>

${oHtml}

</div>

</div>

`;

});

}

document.getElementById('total-votes').innerText=globalV;

const lBox=document.getElementById('leaderboard-mini');

lBox.innerHTML=Object.entries(leaders)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)
.map(l=>`<div class="leader-item"><span>@${l[0]}</span><span>${l[1]} WINS</span></div>`)
.join('')||"No winners yet...";

setTimeout(()=>document.getElementById('loader').classList.add('hidden'),800);

});

/* swipe cards */

document.addEventListener("touchstart",e=>{
const card=e.target.closest(".card");
if(!card)return;
card.startX=e.touches[0].clientX;
});

document.addEventListener("touchmove",e=>{
const card=e.target.closest(".card");
if(!card||card.startX===undefined)return;

let dx=e.touches[0].clientX-card.startX;
dx=Math.max(-60,Math.min(60,dx));

card.style.transform=`translateX(${dx}px)`;
card.classList.add("swiping");
});

document.addEventListener("touchend",()=>{
document.querySelectorAll(".card.swiping").forEach(card=>{
card.style.transform="";
card.classList.remove("swiping");
card.startX=undefined;
});
});

</script>

</body>
</html>
